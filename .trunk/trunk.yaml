# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.10
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
    - ruby@3.1.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - standardrb
  enabled:
    - renovate@39.182.3
    - taplo@0.9.3
    - rubocop@1.39.0:
        packages:
          - argon2@2.3.2
          - bcrypt@3.1.20
          - bootsnap@1.18.4
          - brakeman@7.0.0
          - capybara@3.40.0
          - debug@1.10.0
          - image_processing@1.14.0
          - importmap-rails@2.1.0
          - jbuilder@2.13.0
          - jwt@2.10.1
          - kamal@2.5.2
          - propshaft@1.1.0
          - pry@0.14.2
          - pry-byebug@3.10.1
          - pry-rails@0.3.11
          - pry-rescue@1.6.0
          - pry-stack_explorer@0.6.1
          - puma@6.6.0
          - rails@8.0.1
          - rodauth-rails@2.0.2
          - rubocop@1.71.2
          - rubocop-capybara@2.21.0
          - rubocop-rails@2.26.2
          - selenium-webdriver@4.29.1
          - sequel-activerecord_connection@2.0.0
          - solid_cable@3.0.7
          - solid_cache@1.0.7
          - solid_queue@1.1.3
          - sqlite3@2.6.0
          - stimulus-rails@1.3.4
          - tailwindcss-rails@4.1.0
          - thruster@0.1.11
          - tilt@2.6.0
          - turbo-rails@2.0.11
          # - tzinfo-data
          - web-console@4.2.1
    - actionlint@1.7.7
    - brakeman@5.4.0
    - checkov@3.2.377
    - git-diff-check
    - hadolint@2.12.1-beta
    - markdownlint@0.44.0
    - osv-scanner@1.9.2
    - oxipng@9.1.4
    - prettier@3.5.2
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - svgo@3.3.2
    - trufflehog@3.88.13
    - yamllint@1.35.1
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
